<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Station Control — Echo FM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <a href="index.html" class="logo">Echo FM</a>
  <nav class="nav">
    <a href="index.html" class="nav-link">Home</a>
    <a href="control.html" class="nav-link active">Control Panel</a>
    <a href="#" class="nav-link">Archives</a>
  </nav>
  <div class="mode-pill" id="mode-pill">
    <span class="blink-dot"></span>
    <span id="mode-label">INITIALISING</span>
  </div>
  <div class="header-clock" id="header-clock">——:——:——</div>
</header>

<div id="app">
  <!-- The status bar now serves as sub-header -->
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-lbl">Broadcasts</div>
      <div class="stat-val" id="stat-count">—</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Total Plays</div>
      <div class="stat-val" id="stat-plays">—</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Total Likes</div>
      <div class="stat-val" id="stat-likes">—</div>
    </div>
  </div>

  <div class="main-grid">
    <!-- Feed -->
    <div class="feed-panel">
      <div class="feed-top">
        <span class="feed-top-label">Episode Feed</span>
        <span class="feed-top-count" id="feed-count">—</span>
      </div>
      <div class="feed-list" id="feed-list">
        <div class="feed-no-ep">Awaiting signal...</div>
      </div>
    </div>

    <!-- Detail -->
    <div class="detail-panel" id="detail-panel">
      <div class="detail-empty" id="detail-empty">
        <div class="detail-empty-glyph">▶ FM</div>
        <div class="detail-empty-label">Select a broadcast to inspect</div>
      </div>
      <div class="detail-inner" id="detail-inner" style="display:none"></div>
    </div>
  </div>
</div>

<footer class="footer">
  <div>&copy; 2026 Echo FM — Autonomous Satirical Radio</div>
  <div class="footer-links">
    <a href="#" class="footer-link">Documentation</a>
    <a href="#" class="footer-link">GitHub</a>
    <span id="header-freq" style="margin-left: 10px; font-size: 9px; opacity: 0.5;">——</span>
  </div>
</footer>

<script src="app.js"></script>
</body>
</html>
