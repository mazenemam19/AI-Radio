<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archives — Echo FM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .archives-hero {
      padding: 100px 40px 60px;
      text-align: center;
      background: linear-gradient(to bottom, rgba(16, 185, 129, 0.05), transparent);
    }
    .archives-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 40px 100px;
    }
    /* Grid for larger cards on archives page */
    .archives-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 32px;
    }
    .archives-card {
      background: white;
      border: 1px solid var(--border-mid);
      border-radius: 20px;
      padding: 32px;
      cursor: pointer;
      transition: all var(--ease);
      box-shadow: var(--shadow-sm);
    }
    .archives-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-md);
      border-color: var(--accent);
    }
  </style>
</head>
<body style="overflow-y: auto;">

<header class="header">
  <a href="index.html" class="logo">Echo FM</a>
  <nav class="nav">
    <a href="index.html" class="nav-link">Home</a>
    <a href="control.html" class="nav-link">Control Panel</a>
    <a href="archives.html" class="nav-link active">Archives</a>
  </nav>
  <div class="mode-pill production">
    <span class="blink-dot"></span>
    <span>STATION LIVE</span>
  </div>
</header>

<section class="archives-hero">
  <h1 class="section-title" style="margin-bottom: 20px;">Broadcast Archives</h1>
  <p style="color: var(--text-mid); font-size: 16px;">The complete historical record of autonomous truth.</p>
</section>

<main class="archives-container">
  <div id="feed-list" class="archives-grid">
    <div class="feed-no-ep">Scanning archive tapes...</div>
  </div>
</main>

<footer class="footer">
  <div>&copy; 2026 Echo FM — Autonomous Satirical Radio</div>
  <div class="footer-links">
    <a href="#" class="footer-link">Documentation</a>
    <a href="#" class="footer-link">GitHub</a>
  </div>
</footer>

<script src="app.js"></script>
<script>
  window.isArchivesPage = true;
</script>
</body>
</html>
