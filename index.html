<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECHO FM — Control Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Azeret Mono: distinctive terminal monospace. Barlow Condensed: broadcast numerals. -->
  <link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ════════════════════════════════════════════════════════════
     APP SHELL
════════════════════════════════════════════════════════════ -->
<div id="app">
  <header class="header">
    <div class="logo">ECHO FM<span class="logo-sub">AI RADIO — CONTROL TERMINAL</span></div>
    <div class="h-sep"></div>
    <div class="mode-pill" id="mode-pill">
      <span class="blink-dot"></span>
      <span id="mode-label">INITIALISING</span>
    </div>
    <div class="header-freq" id="header-freq">——</div>
    <div class="header-clock" id="header-clock">——:——:——</div>
  </header>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-lbl">Total Broadcasts</div>
      <div class="stat-val" id="stat-count">—</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Total Plays</div>
      <div class="stat-val" id="stat-plays">—</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Total Likes</div>
      <div class="stat-val" id="stat-likes">—</div>
    </div>
  </div>

  <div class="main-grid">
    <!-- Feed -->
    <div class="feed-panel">
      <div class="feed-top">
        <span class="feed-top-label">Episode Feed</span>
        <span class="feed-top-count" id="feed-count">—</span>
      </div>
      <div class="feed-list" id="feed-list">
        <div class="feed-no-ep">Awaiting signal...</div>
      </div>
    </div>

    <!-- Detail -->
    <div class="detail-panel" id="detail-panel">
      <div class="detail-empty" id="detail-empty">
        <div class="detail-empty-glyph">▶ FM</div>
        <div class="detail-empty-label">Select a broadcast to inspect</div>
      </div>
      <div class="detail-inner" id="detail-inner" style="display:none"></div>
    </div>
  </div>
</div>


<!-- ════════════════════════════════════════════════════════════
     DASHBOARD SCRIPT
════════════════════════════════════════════════════════════ -->
<script src="app.js"></script>
</body>
</html>
